name: Build and Deploy

on:
  push:
    branches: ["master"]

env:
  REGISTRY: registry.rodydavis.dev
  IMAGE_NAME: pocket-piano-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          version: '3.41.5'
          channel: 'stable'
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --base-href /web/ --wasm

      - name: Build CLI Server
        run: dart build cli -o build/server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Dynamic Dockerfile
        run: |
          cat <<EOF > Dockerfile
          # syntax=docker/dockerfile:1.4
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y --no-install-recommends \
              curl \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY build/server/bundle /app/server
          COPY build/web /app/build/web
          COPY content /app/content
          COPY templates /app/templates
          EXPOSE 80
          ENV PORT=80
          CMD ["/app/server/bin/server"]
          EOF

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Coolify
        run: |
          curl --request GET '${{ secrets.COOLIFY_WEBHOOK }}' --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'
